name: Deploy documentation to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'docs/**'
      - 'simulations/plots/**'
      - 'assets/renders/**'
      - 'assets/datasheets/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: |
          # Create site structure
          mkdir -p _site/docs _site/simulations/plots _site/assets/renders _site/assets/datasheets

          # Copy README as index.html with GitHub-flavored markdown styling
          # Use Python to convert markdown to HTML
          pip install --quiet markdown pymdown-extensions

          python3 << 'PYEOF'
          import markdown
          import os

          # Convert README.md to index.html
          with open('README.md') as f:
              md_text = f.read()

          html_body = markdown.markdown(
              md_text,
              extensions=['pymdownx.superfences', 'tables', 'fenced_code', 'toc']
          )

          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Mk3 Reference Loudspeaker</title>
              <style>
                  :root {{
                      --bg: #ffffff;
                      --fg: #1f2328;
                      --muted: #656d76;
                      --accent: #0969da;
                      --border: #d0d7de;
                      --code-bg: #f6f8fa;
                      --max-width: 980px;
                  }}
                  * {{ box-sizing: border-box; }}
                  body {{
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
                      line-height: 1.6;
                      color: var(--fg);
                      background: var(--bg);
                      margin: 0;
                      padding: 0;
                  }}
                  .container {{
                      max-width: var(--max-width);
                      margin: 0 auto;
                      padding: 2rem 1rem;
                  }}
                  h1, h2, h3, h4, h5, h6 {{
                      margin-top: 1.5em;
                      margin-bottom: 0.5em;
                      font-weight: 600;
                      line-height: 1.25;
                  }}
                  h1 {{ font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }}
                  h2 {{ font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: .3em; }}
                  h3 {{ font-size: 1.25em; }}
                  a {{ color: var(--accent); text-decoration: none; }}
                  a:hover {{ text-decoration: underline; }}
                  img {{ max-width: 100%; height: auto; border-radius: 8px; }}
                  table {{
                      border-collapse: collapse;
                      margin: 1em 0;
                      display: block;
                      overflow-x: auto;
                  }}
                  th, td {{
                      border: 1px solid var(--border);
                      padding: 6px 13px;
                      text-align: left;
                  }}
                  th {{ background: var(--code-bg); font-weight: 600; }}
                  tr:nth-child(even) {{ background: var(--code-bg); }}
                  code {{
                      background: var(--code-bg);
                      padding: 0.2em 0.4em;
                      border-radius: 4px;
                      font-size: 0.9em;
                  }}
                  pre {{
                      background: var(--code-bg);
                      padding: 1em;
                      border-radius: 8px;
                      overflow-x: auto;
                  }}
                  pre code {{ background: none; padding: 0; }}
                  blockquote {{
                      border-left: 4px solid var(--border);
                      margin: 1em 0;
                      padding: 0 1em;
                      color: var(--muted);
                  }}
                  hr {{
                      border: none;
                      border-top: 1px solid var(--border);
                      margin: 2em 0;
                  }}
                  .badges {{ margin-bottom: 1rem; }}
                  .badges img {{ display: inline; height: 20px; border-radius: 0; }}
              </style>
          </head>
          <body>
              <div class="container">
                  {html_body}
              </div>
          </body>
          </html>
          """

          with open('_site/index.html', 'w') as f:
              f.write(html)

          # Convert all docs/*.md to HTML
          for fname in sorted(os.listdir('docs')):
              if fname.endswith('.md'):
                  with open(f'docs/{fname}') as f:
                      md = f.read()
                  body = markdown.markdown(md, extensions=['pymdownx.superfences', 'tables', 'fenced_code'])
                  # Fix relative links: ./docs/xxx.md → xxx.html
                  body = body.replace('docs/', '').replace('.md', '.html')
                  # Fix image paths
                  body = body.replace('src="../', 'src="../').replace('src="assets/', 'src="../assets/')
                  body = body.replace('src="simulations/', 'src="../simulations/')
                  body = body.replace('href="../', 'href="../')

                  doc_html = html.replace('<title>Mk3 Reference Loudspeaker</title>',
                                          f'<title>{fname.replace(".md","")} — Mk3 Reference Loudspeaker</title>')
                  doc_html = doc_html.replace(html_body, body)

                  out_name = fname.replace('.md', '.html')
                  with open(f'_site/docs/{out_name}', 'w') as f:
                      f.write(doc_html)

          print(f"Generated {len(os.listdir('_site/docs'))} doc pages")
          PYEOF

          # Copy static assets
          cp simulations/plots/*.png _site/simulations/plots/ 2>/dev/null || true
          cp assets/renders/*.png _site/assets/renders/ 2>/dev/null || true
          cp assets/datasheets/*.pdf _site/assets/datasheets/ 2>/dev/null || true
          cp assets/datasheets/*.csv _site/assets/datasheets/ 2>/dev/null || true

          # Create _site/.nojekyll to bypass Jekyll processing
          touch _site/.nojekyll

          echo "=== Site contents ==="
          find _site -type f | head -40
          echo "=== Total files ==="
          find _site -type f | wc -l

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
