name: Render CAD models

on:
  push:
    branches: [main]
    paths:
      - 'cad/**.scad'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y openscad xvfb python3
          openscad --version

      - name: Prepare output directories
        run: |
          mkdir -p assets/renders
          mkdir -p cad/exports

      - name: Render STLs
        run: |
          cd cad
          openscad -o exports/mk2_waveguide_os.stl mk2_waveguide_os.scad 2>&1 | tee /tmp/wg_stl.log
          openscad -o exports/mk2_cabinet.stl cabinet.scad 2>&1 | tee /tmp/cab_stl.log
          ls -lh exports/

      - name: Render PNGs (Python batch)
        run: |
          python3 scripts/render_cad.py --workers 4
          ls -lh assets/renders/

      - name: Commit renders
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/renders/
          git diff --staged --quiet && echo "No changes" || (git commit -m "ci(cad): auto-render preview images [skip ci]" && git push)

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create STL release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cad-r${{ github.run_number }}
          name: "CAD Export #${{ github.run_number }} (${{ steps.sha.outputs.short }})"
          make_latest: true
          body: |
            Automatically rendered STL exports from commit `${{ github.sha }}`.

            ## Downloads
            | File | Description |
            |------|-------------|
            | `mk2_waveguide_os.stl` | WG212 for H2606/920000 |
            | `mk2_cabinet.stl` | v6b cabinet — 300 × 370 × 1080 mm |

            ## Views (16 total)
            Rendered via `scripts/render_cad.py` with 4 parallel workers.
            
            **Waveguide:** mouth, rear, side, top, iso, cutaway
            **Cabinet:** front, rear, left, right, top, bottom, exterior, cutaway, assembly, full-cutaway

            Preview renders in [`assets/renders/`](../blob/main/assets/renders/).
          files: |
            cad/exports/mk2_waveguide_os.stl
            cad/exports/mk2_cabinet.stl
