name: Render CAD models

on:
  push:
    branches: [main]
    paths:
      - 'cad/**.scad'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-22.04
    timeout-minutes: 30  # Increased timeout

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y openscad xvfb python3
          openscad --version

      # Step 1: Render STLs first (sequential, fast)
      - name: Export STLs
        run: |
          mkdir -p cad/exports
          cd cad
          openscad -o exports/mk2_waveguide_os.stl mk2_waveguide_os.scad 2>&1 | head -20
          openscad -o exports/mk2_cabinet.stl cabinet.scad 2>&1 | head -20
          ls -lh exports/

      # Step 2: Render waveguide PNGs (parallel, fewer workers)
      - name: Render waveguide views
        run: |
          mkdir -p assets/renders
          cd cad
          # Lower parallel jobs and stagger starts to avoid overwhelming runner
          xvfb-run -a openscad --render --camera=0,0,45,0,0,0,600 --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho -o ../assets/renders/waveguide_mouth.png mk2_waveguide_os.scad &
          xvfb-run -a openscad --render --camera=0,0,45,180,0,0,600 --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho -o ../assets/renders/waveguide_rear.png mk2_waveguide_os.scad &
          wait
          xvfb-run -a openscad --render --camera=0,0,45,90,0,90,600 --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho -o ../assets/renders/waveguide_side.png mk2_waveguide_os.scad &
          xvfb-run -a openscad --render --camera=0,0,45,0,0,180,600 --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho -o ../assets/renders/waveguide_top.png mk2_waveguide_os.scad &
          wait
          xvfb-run -a openscad --render --camera=200,-200,120,55,0,35,700 --imgsize=1920,1080 --colorscheme=Cornfield --projection=perspective -o ../assets/renders/waveguide_iso.png mk2_waveguide_os.scad
          xvfb-run -a openscad --render --camera=0,0,45,90,0,90,600 --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho -D 'show_cutaway=true' -o ../assets/renders/waveguide_cutaway.png mk2_waveguide_os.scad
          ls -lh ../assets/renders/waveguide_*.png

      # Step 3: Render cabinet PNGs (parallel)
      - name: Render cabinet views
        run: |
          cd cad
          xvfb-run -a openscad --render -D 'show_drivers=true' --camera=0,200,540,0,0,0,1800 --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho -o ../assets/renders/cabinet_front.png cabinet.scad &
          xvfb-run -a openscad --render --camera=0,-200,540,180,0,0,1800 --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho -o ../assets/renders/cabinet_rear.png cabinet.scad &
          wait
          xvfb-run -a openscad --render -D 'show_drivers=true' --camera=0,90,540,0,-90,0,1400 --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho -o ../assets/renders/cabinet_left.png cabinet.scad &
          xvfb-run -a openscad --render -D 'show_drivers=true' --camera=0,90,540,0,90,0,1400 --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho -o ../assets/renders/cabinet_right.png cabinet.scad &
          wait
          xvfb-run -a openscad --render --camera=0,90,540,0,0,180,1800 --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho -o ../assets/renders/cabinet_top.png cabinet.scad &
          xvfb-run -a openscad --render --camera=0,90,540,0,180,0,1800 --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho -o ../assets/renders/cabinet_bottom.png cabinet.scad &
          wait
          xvfb-run -a openscad --render -D 'show_drivers=true' --camera=500,500,900,60,0,45,2000 --imgsize=1920,1080 --colorscheme=Cornfield --projection=perspective -o ../assets/renders/cabinet_exterior.png cabinet.scad &
          xvfb-run -a openscad --render -D 'show_internals=true' -D 'show_drivers=true' --camera=0,90,540,70,0,0,1600 --imgsize=1920,1080 --colorscheme=Cornfield --projection=perspective -o ../assets/renders/cabinet_cutaway.png cabinet.scad &
          wait
          xvfb-run -a openscad --render -D 'show_drivers=true' -D 'show_waveguide=true' --camera=400,500,700,70,0,20,1800 --imgsize=1920,1080 --colorscheme=Cornfield --projection=perspective -o ../assets/renders/cabinet_assembly.png cabinet.scad &
          xvfb-run -a openscad --render -D 'show_internals=true' -D 'show_waveguide=true' -D 'show_drivers=true' --camera=400,400,700,65,0,35,1800 --imgsize=1920,1080 --colorscheme=Cornfield --projection=perspective -o ../assets/renders/cabinet_full_cutaway.png cabinet.scad &
          wait
          ls -lh ../assets/renders/

      - name: Commit renders
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/renders/ cad/exports/
          git diff --staged --quiet && echo "No changes" || (git commit -m "ci(cad): auto-render STL + PNG images [skip ci]" && git push)

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create STL release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cad-r${{ github.run_number }}
          name: "CAD Export #${{ github.run_number }} (${{ steps.sha.outputs.short }})"
          make_latest: true
          body: |
            Automatically rendered STL + PNG exports.
            ## Downloads
            | File | Description |
            |------|-------------|
            | `mk2_waveguide_os.stl` | WG212 for H2606/920000 |
            | `mk2_cabinet.stl` | v6b cabinet — 300 × 370 × 1080 mm |
            ## Views (16 total)
            **Waveguide:** mouth, rear, side, top, iso, cutaway
            **Cabinet:** front, rear, left, right, top, bottom, exterior, cutaway, assembly, full-cutaway
            Preview renders in [`assets/renders/`](../blob/main/assets/renders/).
          files: |
            cad/exports/mk2_waveguide_os.stl
            cad/exports/mk2_cabinet.stl
