name: Render CAD models

on:
  push:
    branches: [main]
    paths:
      - 'cad/**.scad'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSCAD
        run: |
          sudo apt-get update -q
          sudo apt-get install -y openscad xvfb

      - name: Export STLs
        run: |
          mkdir -p cad/exports
          cd cad
          openscad -o exports/mk2_waveguide_os.stl mk2_waveguide_os.scad
          openscad -o exports/mk2_cabinet.stl cabinet.scad
          ls -lh exports/

      # Vector camera format: --camera=eye_x,eye_y,eye_z,target_x,target_y,target_z
      # Much simpler than gimbal - just position camera and look at target
      - name: Render waveguide views
        run: |
          mkdir -p assets/renders
          cd cad
          # Waveguide: center (0,0,45), size ~294x175x98mm
          # Front (mouth, from +Z): eye=(0,0,400) target=(0,0,45)
          xvfb-run -a openscad --preview \
            --camera=0,0,400,0,0,45 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/waveguide_mouth.png mk2_waveguide_os.scad
          # Rear (from -Z): eye=(0,0,-300) target=(0,0,45)
          xvfb-run -a openscad --preview \
            --camera=0,0,-300,0,0,45 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/waveguide_rear.png mk2_waveguide_os.scad
          # Side (from +X): eye=(400,0,45) target=(0,0,45)
          xvfb-run -a openscad --preview \
            --camera=400,0,45,0,0,45 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/waveguide_side.png mk2_waveguide_os.scad
          # Top (from +Y): eye=(0,400,45) target=(0,0,45)
          xvfb-run -a openscad --preview \
            --camera=0,400,45,0,0,45 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/waveguide_top.png mk2_waveguide_os.scad
          # Isometric: eye=(400,-400,300) target=(0,0,45)
          xvfb-run -a openscad --preview \
            --camera=400,-400,300,0,0,45 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/waveguide_iso.png mk2_waveguide_os.scad
          # Cutaway: side view with show_cutaway
          xvfb-run -a openscad --preview \
            --camera=400,0,45,0,0,45 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -D 'show_cutaway=true' \
            -o ../assets/renders/waveguide_cutaway.png mk2_waveguide_os.scad

      - name: Render cabinet views
        run: |
          cd cad
          # Cabinet: 320x370x1080mm, center at (0,185,540)
          # Defaults: show_internals=false, show_waveguide=false, show_drivers=false
          # Each view overrides only what it needs via -D flags
          # Camera distance ~2800mm to fit 1080mm tall cabinet in 1920x1080 frame
          # (OpenSCAD default FOV ~22.5 deg: 540/tan(11.25deg) ≈ 2710mm)

          # FRONT (baffle with drivers, no cutaway)
          xvfb-run -a openscad --preview \
            -D 'show_drivers=true' \
            --camera=0,2800,540,0,185,540 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_front.png cabinet.scad
          # REAR (plain back panel)
          xvfb-run -a openscad --preview \
            --camera=0,-2800,540,0,185,540 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_rear.png cabinet.scad
          # LEFT (woofer visible)
          xvfb-run -a openscad --preview \
            -D 'show_drivers=true' \
            --camera=-2800,185,540,0,185,540 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_left.png cabinet.scad
          # RIGHT (woofer visible)
          xvfb-run -a openscad --preview \
            -D 'show_drivers=true' \
            --camera=2800,185,540,0,185,540 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_right.png cabinet.scad
          # TOP (plain, looking down)
          xvfb-run -a openscad --preview \
            --camera=0,185,2800,0,185,540 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_top.png cabinet.scad
          # BOTTOM (plain, looking up)
          xvfb-run -a openscad --preview \
            --camera=0,185,-2800,0,185,540 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_bottom.png cabinet.scad
          # EXTERIOR 3/4 (drivers visible, no cutaway)
          xvfb-run -a openscad --preview \
            -D 'show_drivers=true' \
            --camera=1200,1600,2000,0,185,540 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_exterior.png cabinet.scad
          # CUTAWAY (internals + drivers, half removed)
          xvfb-run -a openscad --preview \
            -D 'show_internals=true' -D 'show_drivers=true' \
            --camera=1000,1400,1400,0,185,540 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_cutaway.png cabinet.scad
          # ASSEMBLY (waveguide + drivers, no cutaway)
          xvfb-run -a openscad --preview \
            -D 'show_drivers=true' -D 'show_waveguide=true' \
            --camera=900,1400,1700,0,185,850 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_assembly.png cabinet.scad
          # FULL CUTAWAY (everything visible)
          xvfb-run -a openscad --preview \
            -D 'show_internals=true' -D 'show_waveguide=true' -D 'show_drivers=true' \
            --camera=1000,1200,1600,0,185,600 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_full_cutaway.png cabinet.scad
          ls -lh ../assets/renders/

      - name: Commit and release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/renders/ cad/exports/
          git diff --staged --quiet || {
            git commit -m "ci(cad): auto-render STL + 16 views [skip ci]"
            # Retry push with rebase to handle concurrent workflow runs
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $attempt failed, retrying..."
              sleep 5
            done
          }

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cad-r${{ github.run_number }}
          name: "CAD Export #${{ github.run_number }}"
          make_latest: true
          body: |
            ## Downloads
            | File | Description |
            |------|-------------|
            | `mk2_waveguide_os.stl` | WG212 waveguide |
            | `mk2_cabinet.stl` | v6b cabinet |
            
            ## Views (16 total)
            **Waveguide:** mouth, rear, side, top, iso, cutaway  
            **Cabinet:** front, rear, left, right, top, bottom, exterior, cutaway, assembly, full-cutaway
          files: |
            cad/exports/mk2_waveguide_os.stl
            cad/exports/mk2_cabinet.stl
