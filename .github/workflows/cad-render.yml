name: Render CAD models

on:
  push:
    branches: [main]
    paths:
      - 'cad/**.scad'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSCAD
        run: |
          sudo apt-get update -q
          sudo apt-get install -y openscad xvfb

      - name: Export STLs
        run: |
          mkdir -p cad/exports
          cd cad
          openscad -o exports/mk2_waveguide_os.stl mk2_waveguide_os.scad
          openscad -o exports/mk2_cabinet.stl cabinet.scad
          ls -lh exports/

      # All 16 PNG renders - use --preview for speed (still high quality with --imgsize)
      - name: Render waveguide views
        run: |
          mkdir -p assets/renders
          cd cad
          # Waveguide: 6 views (all --preview for speed)
          xvfb-run -a openscad --preview \
            --camera=0,0,45,0,0,0,600 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/waveguide_mouth.png mk2_waveguide_os.scad
          xvfb-run -a openscad --preview \
            --camera=0,0,45,180,0,0,600 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/waveguide_rear.png mk2_waveguide_os.scad
          xvfb-run -a openscad --preview \
            --camera=0,0,45,90,0,90,600 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/waveguide_side.png mk2_waveguide_os.scad
          xvfb-run -a openscad --preview \
            --camera=0,0,45,0,0,180,600 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/waveguide_top.png mk2_waveguide_os.scad
          xvfb-run -a openscad --preview \
            --camera=200,-200,120,55,0,35,700 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/waveguide_iso.png mk2_waveguide_os.scad
          xvfb-run -a openscad --preview \
            --camera=0,0,45,90,0,90,600 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -D 'show_cutaway=true' \
            -o ../assets/renders/waveguide_cutaway.png mk2_waveguide_os.scad

      - name: Render cabinet views
        run: |
          cd cad
          # Cabinet: 10 views
          xvfb-run -a openscad --preview -D 'show_drivers=true' \
            --camera=0,200,540,0,0,0,1800 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/cabinet_front.png cabinet.scad
          xvfb-run -a openscad --preview \
            --camera=0,-200,540,180,0,0,1800 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/cabinet_rear.png cabinet.scad
          xvfb-run -a openscad --preview -D 'show_drivers=true' \
            --camera=0,90,540,0,-90,0,1400 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/cabinet_left.png cabinet.scad
          xvfb-run -a openscad --preview -D 'show_drivers=true' \
            --camera=0,90,540,0,90,0,1400 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/cabinet_right.png cabinet.scad
          xvfb-run -a openscad --preview \
            --camera=0,90,540,0,0,180,1800 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/cabinet_top.png cabinet.scad
          xvfb-run -a openscad --preview \
            --camera=0,90,540,0,180,0,1800 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/cabinet_bottom.png cabinet.scad
          xvfb-run -a openscad --preview -D 'show_drivers=true' \
            --camera=500,500,900,60,0,45,2000 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_exterior.png cabinet.scad
          xvfb-run -a openscad --preview -D 'show_internals=true' -D 'show_drivers=true' \
            --camera=0,90,540,70,0,0,1600 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_cutaway.png cabinet.scad
          xvfb-run -a openscad --preview -D 'show_drivers=true' -D 'show_waveguide=true' \
            --camera=400,500,700,70,0,20,1800 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_assembly.png cabinet.scad
          xvfb-run -a openscad --preview -D 'show_internals=true' -D 'show_waveguide=true' -D 'show_drivers=true' \
            --camera=400,400,700,65,0,35,1800 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_full_cutaway.png cabinet.scad
          ls -lh ../assets/renders/

      - name: Commit and release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/renders/ cad/exports/
          git diff --staged --quiet || (git commit -m "ci(cad): auto-render STL + 16 views [skip ci]" && git push)

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cad-r${{ github.run_number }}
          name: "CAD Export #${{ github.run_number }}"
          make_latest: true
          body: |
            ## Downloads
            | File | Description |
            |------|-------------|
            | `mk2_waveguide_os.stl` | WG212 waveguide |
            | `mk2_cabinet.stl` | v6b cabinet |
            
            ## Views (16 total)
            **Waveguide:** mouth, rear, side, top, iso, cutaway  
            **Cabinet:** front, rear, left, right, top, bottom, exterior, cutaway, assembly, full-cutaway
          files: |
            cad/exports/mk2_waveguide_os.stl
            cad/exports/mk2_cabinet.stl
