name: Run simulations

on:
  push:
    branches: [main]
    paths:
      - 'simulations/**.py'
      - 'SIMULATIONS.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  simulate:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install --quiet "numpy>=1.26,<3" "matplotlib>=3.8,<4" "scipy>=1.12"

      # Bass alignment (crossover-agnostic)
      - name: Run bass_alignment_maxspl.py
        working-directory: simulations
        run: python bass_alignment_maxspl.py 2>&1

      - name: Run bass_volume_compare.py
        working-directory: simulations
        run: python bass_volume_compare.py 2>&1

      # Baffle and waveguide
      - name: Run baffle_step.py
        working-directory: simulations
        run: python baffle_step.py 2>&1

      - name: Run waveguide_profile.py
        working-directory: simulations
        run: python waveguide_profile.py 2>&1

      # Directivity and lobing (1100 Hz crossover)
      - name: Run directivity_estimate.py
        working-directory: simulations
        run: python directivity_estimate.py 2>&1

      - name: Run vertical_lobing.py
        working-directory: simulations
        run: python vertical_lobing.py 2>&1

      - name: Run vertical_polar_map.py
        working-directory: simulations
        run: python vertical_polar_map.py 2>&1

      - name: Run polar_response.py
        working-directory: simulations
        run: python polar_response.py 2>&1

      # System response and crossover (1100 Hz, SB26STAC)
      - name: Run system_response_realistic.py
        working-directory: simulations
        run: python system_response_realistic.py 2>&1

      - name: Run spinorama_estimate.py
        working-directory: simulations
        run: python spinorama_estimate.py 2>&1

      - name: Run crossover_optimization.py
        working-directory: simulations
        run: python crossover_optimization.py 2>&1

      - name: Run tweeter_comparison.py
        working-directory: simulations
        run: python tweeter_comparison.py 2>&1

      - name: List generated outputs
        run: |
          echo "=== simulations/plots/ ==="
          ls -lh simulations/plots/
          echo "=== simulations/csv/ ==="
          ls -lh simulations/csv/ 2>/dev/null || echo "(none yet)"

      - name: Commit updated simulation outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add simulations/plots/ simulations/csv/
          git diff --staged --quiet && echo "No output changes." || \
            git commit -m "ci(sims): update simulation outputs [skip ci]

          Triggered by: ${{ github.sha }}" && git push

      - name: Upload simulation outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: simulation-outputs-${{ github.run_number }}
          path: |
            simulations/plots/
            simulations/csv/
          retention-days: 90
          if-no-files-found: error
