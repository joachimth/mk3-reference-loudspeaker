name: Build and deploy

# Unified workflow: runs all simulations, renders CAD, commits outputs,
# builds the GitHub Pages site, and deploys it. Everything in one pipeline
# so Pages always has the latest renders + plots.

on:
  push:
    branches: [main]
    paths:
      - 'simulations/**.py'
      - 'cad/**.scad'
      - 'assets/datasheets/**'
      - 'assets/cad/**'
      - 'SIMULATIONS.md'
      - 'README.md'
      - 'docs/**'
      - 'assets/renders/**'
      - 'simulations/plots/**'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ============================================================
      #  1. Python + dependencies
      # ============================================================
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install --quiet "numpy>=1.26,<3" "matplotlib>=3.8,<4" "scipy>=1.12"

      # ============================================================
      #  2. Run all simulation scripts
      # ============================================================
      - name: Run all simulations
        working-directory: simulations
        run: |
          for script in \
            bass_alignment_maxspl.py \
            bass_volume_compare.py \
            baffle_step.py \
            waveguide_profile.py \
            directivity_estimate.py \
            vertical_lobing.py \
            vertical_polar_map.py \
            polar_response.py \
            system_response_realistic.py \
            spinorama_estimate.py \
            crossover_optimization.py \
            tweeter_comparison.py
          do
            echo "::group::Running $script"
            python "$script" 2>&1 || echo "::warning::$script failed (non-blocking)"
            echo "::endgroup::"
          done

      - name: List simulation outputs
        run: |
          echo "=== simulations/plots/ ==="
          ls -lh simulations/plots/
          echo "=== simulations/csv/ ==="
          ls -lh simulations/csv/ 2>/dev/null || echo "(none)"

      # ============================================================
      #  3. Install OpenSCAD + render CAD
      # ============================================================
      - name: Install OpenSCAD
        run: |
          sudo apt-get update -q
          sudo apt-get install -y openscad xvfb

      - name: Export STLs
        run: |
          mkdir -p cad/exports
          cd cad
          openscad -o exports/waveguide.stl waveguide.scad 2>&1 || echo "::warning::waveguide STL export failed"
          openscad -o exports/cabinet.stl cabinet.scad 2>&1 || echo "::warning::cabinet STL export failed"
          ls -lh exports/

      - name: Render waveguide views
        run: |
          mkdir -p assets/renders
          cd cad
          xvfb-run -a openscad --preview \
            --camera=0,0,400,0,0,45 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/waveguide_mouth.png waveguide.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            --camera=0,0,-300,0,0,45 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/waveguide_rear.png waveguide.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            --camera=400,0,45,0,0,45 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/waveguide_side.png waveguide.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            --camera=0,400,45,0,0,45 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/waveguide_top.png waveguide.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            --camera=400,-400,300,0,0,45 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/waveguide_iso.png waveguide.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            --camera=400,0,45,0,0,45 \
            --imgsize=1920,1080 --colorscheme=Cornfield --projection=ortho \
            -D 'show_cutaway=true' \
            -o ../assets/renders/waveguide_cutaway.png waveguide.scad 2>&1 || true

      - name: Render cabinet views
        run: |
          cd cad
          xvfb-run -a openscad --preview \
            -D 'show_drivers=true' \
            --camera=0,2800,540,0,185,540 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_front.png cabinet.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            --camera=0,-2800,540,0,185,540 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_rear.png cabinet.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            -D 'show_drivers=true' \
            --camera=-2800,185,540,0,185,540 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_left.png cabinet.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            -D 'show_drivers=true' \
            --camera=2800,185,540,0,185,540 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_right.png cabinet.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            --camera=0,185,2800,0,185,540 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_top.png cabinet.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            --camera=0,185,-2800,0,185,540 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_bottom.png cabinet.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            -D 'show_drivers=true' \
            --camera=1200,1600,2000,0,185,540 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_exterior.png cabinet.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            -D 'show_internals=true' -D 'show_drivers=true' \
            --camera=1000,1400,1400,0,185,540 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_cutaway.png cabinet.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            -D 'show_drivers=true' -D 'show_waveguide=true' \
            --camera=900,1400,1700,0,185,850 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_assembly.png cabinet.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            -D 'show_internals=true' -D 'show_waveguide=true' -D 'show_drivers=true' \
            --camera=1000,1200,1600,0,185,600 \
            --imgsize=1920,1080 --colorscheme=Cornfield \
            -o ../assets/renders/cabinet_full_cutaway.png cabinet.scad 2>&1 || true
          ls -lh ../assets/renders/

      - name: Render driver models
        run: |
          cd cad
          # SB26STAC-C000-4 tweeter — front, iso, section
          xvfb-run -a openscad --preview \
            --camera=0,0,80,0,0,0 \
            --imgsize=1200,1200 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/driver_tweeter_front.png SB26STAC-C000-4.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            --camera=200,-200,150,0,0,35 \
            --imgsize=1200,1200 --colorscheme=Cornfield \
            -o ../assets/renders/driver_tweeter_iso.png SB26STAC-C000-4.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            -D 'vis="snit"' \
            --camera=200,-200,150,0,0,35 \
            --imgsize=1200,1200 --colorscheme=Cornfield \
            -o ../assets/renders/driver_tweeter_section.png SB26STAC-C000-4.scad 2>&1 || true
  
          # GRS 12SW-4HE woofer — front, iso, section, cutout
          xvfb-run -a openscad --preview \
            --camera=0,0,200,0,0,0 \
            --imgsize=1200,1200 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/driver_woofer_front.png GRS-12SW-4HE.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            --camera=400,-400,300,0,0,35 \
            --imgsize=1200,1200 --colorscheme=Cornfield \
            -o ../assets/renders/driver_woofer_iso.png GRS-12SW-4HE.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            -D 'vis="snit"' \
            --camera=400,-400,300,0,0,35 \
            --imgsize=1200,1200 --colorscheme=Cornfield \
            -o ../assets/renders/driver_woofer_section.png GRS-12SW-4HE.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            -D 'vis="skabelon"' \
            --camera=0,0,200,0,0,0 \
            --imgsize=1200,1200 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/driver_woofer_template.png GRS-12SW-4HE.scad 2>&1 || true
  
          # 18W/4424G00 midrange — front, iso, section
          xvfb-run -a openscad --preview \
            --camera=0,0,200,0,0,0 \
            --imgsize=1200,1200 --colorscheme=Cornfield --projection=ortho \
            -o ../assets/renders/driver_midrange_front.png midrange.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            --camera=400,-400,300,0,0,35 \
            --imgsize=1200,1200 --colorscheme=Cornfield \
            -o ../assets/renders/driver_midrange_iso.png midrange.scad 2>&1 || true
          xvfb-run -a openscad --preview \
            -D 'vis="snit"' \
            --camera=400,-400,300,0,0,35 \
            --imgsize=1200,1200 --colorscheme=Cornfield \
            -o ../assets/renders/driver_midrange_section.png midrange.scad 2>&1 || true
  
          ls -lh ../assets/renders/driver_*.png
  
        # ============================================================
      #  4. Commit all generated outputs back to repo
      # ============================================================
      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add simulations/plots/ simulations/csv/ assets/renders/ cad/exports/
          git diff --staged --quiet && echo "No output changes." || {
            git commit -m "ci: update simulations + CAD renders [skip ci]

          Triggered by: ${{ github.sha }}"
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $attempt failed, retrying..."
              sleep 5
            done
          }

      # ============================================================
      #  5. Upload artifacts
      # ============================================================
      - name: Upload outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs-${{ github.run_number }}
          path: |
            simulations/plots/
            simulations/csv/
            assets/renders/
            cad/exports/
          retention-days: 90
          if-no-files-found: warn

  # ============================================================
  #  6. Build and deploy GitHub Pages
  #     Runs AFTER build job, so all renders + plots are committed.
  # ============================================================
  deploy-pages:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Pages site
        run: |
          # Build a static HTML site from README.md and docs
          pip install --quiet markdown pymdown-extensions

          mkdir -p _site/docs _site/simulations/plots _site/assets/renders _site/assets/datasheets

          python3 << 'PYEOF'
          import markdown
          import os
          import re

          html_template = """<!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Mk3 Reference Loudspeaker</title>
              <style>
                  :root { --bg:#fff; --fg:#1f2328; --muted:#656d76; --accent:#0969da; --border:#d0d7de; --code-bg:#f6f8fa; }
                  * { box-sizing:border-box; }
                  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; line-height:1.6; color:var(--fg); background:var(--bg); margin:0; }
                  .container { max-width:980px; margin:0 auto; padding:2rem 1rem; }
                  h1,h2,h3,h4 { margin-top:1.5em; margin-bottom:.5em; font-weight:600; line-height:1.25; }
                  h1 { font-size:2em; border-bottom:1px solid var(--border); padding-bottom:.3em; }
                  h2 { font-size:1.5em; border-bottom:1px solid var(--border); padding-bottom:.3em; }
                  a { color:var(--accent); text-decoration:none; }
                  a:hover { text-decoration:underline; }
                  img { max-width:100%; height:auto; border-radius:8px; }
                  table { border-collapse:collapse; margin:1em 0; display:block; overflow-x:auto; }
                  th,td { border:1px solid var(--border); padding:6px 13px; text-align:left; }
                  th { background:var(--code-bg); font-weight:600; }
                  tr:nth-child(even) { background:var(--code-bg); }
                  code { background:var(--code-bg); padding:.2em .4em; border-radius:4px; font-size:.9em; }
                  pre { background:var(--code-bg); padding:1em; border-radius:8px; overflow-x:auto; }
                  pre code { background:none; padding:0; }
                  blockquote { border-left:4px solid var(--border); margin:1em 0; padding:0 1em; color:var(--muted); }
                  hr { border:none; border-top:1px solid var(--border); margin:2em 0; }
                  .badges img { display:inline; height:20px; border-radius:0; }
              </style>
          </head>
          <body><div class="container">__BODY__</div></body>
          </html>"""

          def md_to_html(md_text):
              return markdown.markdown(md_text, extensions=['pymdownx.superfences', 'tables', 'fenced_code', 'toc'])

          def fix_links(html, from_root=True):
              """Rewrite .md links to .html for Pages site."""
              if from_root:
                  html = re.sub(r'href="(docs/[^"#]+)\.md', r'href="\1.html', html)
                  html = re.sub(r'href="([^/"#]+\w)\.md"', r'href="\1.html"', html)
                  html = re.sub(r'href="((?:assets|cad|dsp-configs|simulations)/[^"#]+)\.md', r'href="\1.html', html)
                  # Relative ../ links from subdirectory pages
                  html = re.sub(r'href="(\.\./[^"#]+)\.md', r'href="\1.html', html)
              else:
                  # From a doc page: docs/XXX.md -> XXX.html, root XXX.md -> ../XXX.html
                  html = re.sub(r'href="docs/([^"#]+)\.md', r'href="\1.html', html)
                  html = re.sub(r'href="([^/"#]+\w)\.md"', r'href="../\1.html"', html)
                  html = re.sub(r'href="((?:assets|cad|dsp-configs|simulations)/[^"#]+)\.md', r'href="../\1.html', html)
                  # Relative ../ links from doc pages (e.g. ../cad/README.md -> ../cad/README.html)
                  html = re.sub(r'href="(\.\./[^"#]+)\.md', r'href="\1.html', html)
                  # Fix asset paths for doc pages
                  html = html.replace('src="assets/', 'src="../assets/').replace('src="simulations/', 'src="../simulations/')
                  html = html.replace('href="assets/', 'href="../assets/').replace('href="simulations/', 'href="../simulations/')
              return html

          # --- Convert README.md to index.html ---
          with open('README.md') as f:
              md_text = f.read()

          # Fix stale badge URLs (old workflows replaced by build-and-deploy.yml)
          md_text = md_text.replace('workflows/simulations.yml/badge.svg', 'workflows/build-and-deploy.yml/badge.svg')
          md_text = md_text.replace('workflows/cad-render.yml/badge.svg', 'workflows/build-and-deploy.yml/badge.svg')

          html_body = md_to_html(md_text)
          html_body = fix_links(html_body, from_root=True)

          html = html_template.replace("__BODY__", html_body)
          with open('_site/index.html', 'w') as f:
              f.write(html)

          # --- Convert docs/*.md to HTML ---
          doc_count = 0
          for fname in sorted(os.listdir('docs')):
              if fname.endswith('.md'):
                  with open(f'docs/{fname}') as f:
                      md = f.read()
                  body = md_to_html(md)
                  body = fix_links(body, from_root=False)
                  doc_html = html_template.replace("__BODY__", body)
                  doc_html = doc_html.replace('<title>Mk3 Reference Loudspeaker</title>',
                                              f'<title>{fname.replace(".md","")} — Mk3</title>')
                  with open(f'_site/docs/{fname.replace(".md",".html")}', 'w') as f:
                      f.write(doc_html)
                  doc_count += 1

          # --- Convert root-level .md files to HTML ---
          root_count = 0
          for fname in sorted(os.listdir('.')):
              if fname.endswith('.md') and fname != 'README.md' and fname != 'index.md':
                  with open(fname) as f:
                      md = f.read()
                  body = md_to_html(md)
                  body = fix_links(body, from_root=True)
                  page_html = html_template.replace("__BODY__", body)
                  page_html = page_html.replace('<title>Mk3 Reference Loudspeaker</title>',
                                                f'<title>{fname.replace(".md","")} — Mk3</title>')
                  with open(f'_site/{fname.replace(".md",".html")}', 'w') as f:
                      f.write(page_html)
                  root_count += 1

          print(f"Generated {doc_count} doc pages, {root_count} root pages")

          # --- Convert subdirectory .md files to HTML ---
          sub_count = 0
          for subdir in ['assets/datasheets', 'assets/cad', 'cad', 'dsp-configs', 'simulations']:
              if not os.path.isdir(subdir):
                  continue
              out_dir = f'_site/{subdir}'
              os.makedirs(out_dir, exist_ok=True)
              for fname in sorted(os.listdir(subdir)):
                  if fname.endswith('.md'):
                      with open(f'{subdir}/{fname}') as f:
                          md = f.read()
                      body = md_to_html(md)
                      body = fix_links(body, from_root=True)
                      page_html = html_template.replace("__BODY__", body)
                      page_html = page_html.replace('<title>Mk3 Reference Loudspeaker</title>',
                                                    f'<title>{fname.replace(".md","")} — Mk3</title>')
                      with open(f'{out_dir}/{fname.replace(".md",".html")}', 'w') as f:
                          f.write(page_html)
                      sub_count += 1
          print(f"Generated {sub_count} subdirectory pages")
          PYEOF

          # Copy static assets (non-.md files)
          cp simulations/plots/*.png _site/simulations/plots/ 2>/dev/null || true
          cp assets/renders/*.png _site/assets/renders/ 2>/dev/null || true
          cp assets/datasheets/*.pdf _site/assets/datasheets/ 2>/dev/null || true
          cp assets/datasheets/*.csv _site/assets/datasheets/ 2>/dev/null || true
          # 3D reference files
          mkdir -p _site/assets/cad
          cp assets/cad/*.step assets/cad/*.STEP assets/cad/*.stp assets/cad/*.STP assets/cad/*.stl assets/cad/*.STL _site/assets/cad/ 2>/dev/null || true
          touch _site/.nojekyll

          echo "=== Site files ==="
          find _site -type f | wc -l
          echo "files generated"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
