<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="654" height="613" viewBox="0 0 654 613">
<style>.panel { fill: #f5f0e0; stroke: #333; stroke-width: 1.5; }
