<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Mk3 Cabinet Drawings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sidebar-w: 230px;
      --accent:    #2980b9;
      --sidebar-bg:#1c2028;
      --sidebar-fg:#c8c8c0;
      --hover-bg:  #2a3040;
      --bg:        #f4f4f0;
      --header-bg: #ffffff;
      --border:    #e0e0d8;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; height: 100dvh; overflow: hidden;
      background: var(--bg); color: #222;
    }

    /* ---- Sidebar ---- */
    #sidebar {
      width: var(--sidebar-w); background: var(--sidebar-bg);
      color: var(--sidebar-fg); display: flex; flex-direction: column;
      flex-shrink: 0; overflow: hidden;
    }
    .sb-head {
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .sb-head h1 {
      font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: #fff;
    }
    .sb-head p {
      font-size: 11px; color: rgba(200,200,190,.55); margin-top: 3px;
    }
    #nav { flex: 1; overflow-y: auto; padding: 8px 0; }
    .group-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: rgba(200,200,190,.4);
      padding: 12px 16px 4px;
    }
    .nav-item {
      display: flex; align-items: flex-start; gap: 9px;
      padding: 7px 14px; cursor: pointer; text-decoration: none;
      color: var(--sidebar-fg); border-left: 2px solid transparent;
      transition: background .1s;
    }
    .nav-item:hover { background: var(--hover-bg); }
    .nav-item.active {
      background: rgba(41,128,185,.18);
      border-left-color: var(--accent); color: #fff;
    }
    .nav-icon { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; opacity: .5; }
    .nav-item.active .nav-icon { opacity: 1; }
    .nav-name { font-size: 13px; line-height: 1.3; }
    .nav-desc { font-size: 10px; color: rgba(200,200,190,.45); margin-top: 1px; }
    .sb-foot {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,.07);
    }
    .btn-all {
      display: block; background: var(--accent); color: #fff;
      text-decoration: none; font-size: 12px; font-weight: 600;
      padding: 8px 12px; border-radius: 5px; text-align: center;
      transition: background .1s;
    }
    .btn-all:hover { background: #3498db; }

    /* ---- Main ---- */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px; background: var(--header-bg);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .t-title { flex: 1; }
    .t-title h2 { font-size: 15px; font-weight: 600; }
    .t-title p  { font-size: 11px; color: #888; margin-top: 1px; }
    .t-btns { display: flex; gap: 7px; align-items: center; }
    .btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 11px; border-radius: 5px; font-size: 12px;
      font-weight: 600; text-decoration: none; cursor: pointer;
      border: 1px solid; transition: all .1s; background: white;
    }
    .btn-nav  { color: #555; border-color: #ddd; padding: 6px 9px; }
    .btn-nav:hover  { background: #f0f0f0; }
    .btn-nav:disabled { opacity: .3; cursor: default; pointer-events: none; }
    .btn-svg  { color: #555; border-color: #ddd; }
    .btn-svg:hover  { background: #f0f0f0; }
    .btn-pdf  { background: #e74c3c; color: #fff; border-color: #c0392b; }
    .btn-pdf:hover  { background: #c0392b; }
    .sep { width: 1px; height: 22px; background: #e0e0e0; margin: 0 2px; }

    /* ---- Viewer ---- */
    #viewer {
      flex: 1; overflow: auto; display: flex;
      align-items: flex-start; justify-content: center;
      padding: 24px;
    }
    #viewer img {
      max-width: 100%; height: auto;
      background: white; border-radius: 4px;
      box-shadow: 0 2px 16px rgba(0,0,0,.1);
    }

    /* ---- Mobile ---- */
    #burger {
      display: none; position: fixed; top: 10px; left: 10px; z-index: 200;
      background: var(--sidebar-bg); color: #fff; border: none;
      padding: 7px 10px; border-radius: 5px; font-size: 17px; cursor: pointer;
    }
    #overlay {
      display: none; position: fixed; inset: 0; z-index: 99;
      background: rgba(0,0,0,.4);
    }
    @media (max-width: 640px) {
      #sidebar {
        position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
        transform: translateX(-100%); transition: transform .2s;
      }
      #sidebar.open { transform: translateX(0); }
      #burger { display: block; }
      #toolbar { padding-left: 52px; }
      #overlay.show { display: block; }
    }
  </style>
</head>
<body>

<button id="burger" onclick="openSidebar()">☰</button>
<div id="overlay" onclick="closeSidebar()"></div>

<nav id="sidebar">
  <div class="sb-head">
    <h1>Mk3 Drawings</h1>
    <p>Cabinet dimensioned drawings</p>
  </div>
  <div id="nav"></div>
  <div class="sb-foot">
    <a class="btn-all" href="mk3-cabinet-drawings.pdf" download>⬇ Download all (PDF)</a>
  </div>
</nav>

<div id="main">
  <div id="toolbar">
    <div class="t-title">
      <h2 id="t-name">—</h2>
      <p  id="t-desc">—</p>
    </div>
    <div class="t-btns">
      <button class="btn btn-nav" id="btn-prev" onclick="go(-1)" title="Forrige (←)">&#8592;</button>
      <button class="btn btn-nav" id="btn-next" onclick="go(1)"  title="Næste (→)">&#8594;</button>
      <div class="sep"></div>
      <a class="btn btn-svg" id="dl-svg" href="" download>⬇ SVG</a>
      <a class="btn btn-pdf" id="dl-pdf" href="" download>⬇ PDF</a>
    </div>
  </div>
  <div id="viewer">
    <img id="img" src="" alt="">
  </div>
</div>

<script>
const D = [
  {
    "stem": "assembly_dims",
    "name": "Assembly Drawing",
    "category": "Overview",
    "desc": "Overall dimensions, driver heights, internal layout",
    "svg": "assembly_dims.svg",
    "pdf": "assembly_dims.pdf"
  },
  {
    "stem": "cut_list",
    "name": "Cut List",
    "category": "Overview",
    "desc": "All panels with dimensions and quantities",
    "svg": "cut_list.svg",
    "pdf": "cut_list.pdf"
  },
  {
    "stem": "front_baffle",
    "name": "Front Baffle",
    "category": "Overview",
    "desc": "Full baffle with mid + waveguide cutouts and pilot holes",
    "svg": "front_baffle.svg",
    "pdf": "front_baffle.pdf"
  },
  {
    "stem": "side_panel",
    "name": "Side Panel",
    "category": "Overview",
    "desc": "Side panel with woofer cutout and shelf brace positions",
    "svg": "side_panel.svg",
    "pdf": "side_panel.pdf"
  },
  {
    "stem": "panel_front_baffle",
    "name": "Front Baffle",
    "category": "Per Panel",
    "desc": "Cut drawing: R19 edges, mid + waveguide cutouts",
    "svg": "panel_front_baffle.svg",
    "pdf": "panel_front_baffle.pdf"
  },
  {
    "stem": "panel_back",
    "name": "Back Panel",
    "category": "Per Panel",
    "desc": "Cut drawing: square edges, no cutouts",
    "svg": "panel_back.svg",
    "pdf": "panel_back.pdf"
  },
  {
    "stem": "panel_side_left",
    "name": "Side Panel L",
    "category": "Per Panel",
    "desc": "Cut drawing: woofer on left face",
    "svg": "panel_side_left.svg",
    "pdf": "panel_side_left.pdf"
  },
  {
    "stem": "panel_side_right",
    "name": "Side Panel R",
    "category": "Per Panel",
    "desc": "Cut drawing: woofer on right face (opposed)",
    "svg": "panel_side_right.svg",
    "pdf": "panel_side_right.pdf"
  },
  {
    "stem": "panel_top",
    "name": "Top Panel",
    "category": "Per Panel",
    "desc": "Cut drawing: R19 front edge",
    "svg": "panel_top.svg",
    "pdf": "panel_top.pdf"
  },
  {
    "stem": "panel_bottom",
    "name": "Bottom Panel",
    "category": "Per Panel",
    "desc": "Cut drawing: R19 front edge",
    "svg": "panel_bottom.svg",
    "pdf": "panel_bottom.pdf"
  },
  {
    "stem": "panel_divider",
    "name": "Divider Plate",
    "category": "Per Panel",
    "desc": "Cut drawing: tilted 19\u00b0 in cabinet",
    "svg": "panel_divider.svg",
    "pdf": "panel_divider.pdf"
  },
  {
    "stem": "panel_shelf_brace",
    "name": "Shelf Brace \u00d73",
    "category": "Per Panel",
    "desc": "Cut drawing: ring shelf, 3 pieces at z=160/330/730",
    "svg": "panel_shelf_brace.svg",
    "pdf": "panel_shelf_brace.pdf"
  },
  {
    "stem": "pine_cutplan",
    "name": "Pine Board Cut Plan",
    "category": "Alt. Material",
    "desc": "5\u00d7 25\u00d7620\u00d72420 mm massiv fyr (Jem & Fix) \u2014 ET PAR (venstre + h\u00f8jre)",
    "svg": "pine_cutplan.svg",
    "pdf": "pine_cutplan.pdf"
  }
];
let cur = 0;

function buildNav() {
  const nav = document.getElementById('nav');
  let lastCat = null;
  D.forEach((d, i) => {
    if (d.category !== lastCat) {
      const g = document.createElement('div');
      g.className = 'group-label';
      g.textContent = d.category;
      nav.appendChild(g);
      lastCat = d.category;
    }
    const a = document.createElement('a');
    a.className = 'nav-item';
    a.id = 'ni' + i;
    a.href = '#';
    a.onclick = e => { e.preventDefault(); select(i); };
    a.innerHTML = `
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="4" y="3" width="14" height="18" rx="1"/>
        <line x1="7" y1="8"  x2="15" y2="8"/>
        <line x1="7" y1="12" x2="13" y2="12"/>
        <line x1="7" y1="16" x2="11" y2="16"/>
      </svg>
      <div>
        <div class="nav-name">${d.name}</div>
        <div class="nav-desc">${d.desc}</div>
      </div>`;
    nav.appendChild(a);
  });
}

function select(i) {
  cur = i;
  const d = D[i];
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const ni = document.getElementById('ni' + i);
  if (ni) { ni.classList.add('active'); ni.scrollIntoView({block:'nearest'}); }
  document.getElementById('t-name').textContent = d.name;
  document.getElementById('t-desc').textContent = d.desc;
  document.getElementById('dl-svg').href     = d.svg;
  document.getElementById('dl-svg').download = d.svg;
  document.getElementById('dl-pdf').href     = d.pdf;
  document.getElementById('dl-pdf').download = d.pdf;
  document.getElementById('btn-prev').disabled = i === 0;
  document.getElementById('btn-next').disabled = i === D.length - 1;
  const img = document.getElementById('img');
  img.src = d.svg;
  img.alt = d.name;
  document.getElementById('viewer').scrollTop = 0;
  closeSidebar();
}

function go(dir) {
  const n = cur + dir;
  if (n >= 0 && n < D.length) select(n);
}

function openSidebar()  { document.getElementById('sidebar').classList.add('open');
                           document.getElementById('overlay').classList.add('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open');
                           document.getElementById('overlay').classList.remove('show'); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  go(-1);
  if (e.key === 'ArrowRight') go(1);
});

buildNav();
select(0);
</script>
</body>
</html>
