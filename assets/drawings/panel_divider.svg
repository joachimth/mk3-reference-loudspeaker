<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="298" height="358" viewBox="0 0 298 358">
<style>.panel { fill: #f5f0e0; stroke: #333; stroke-width: 1.5; }
.cutout { fill: none; stroke: #c0392b; stroke-width: 1.2; stroke-dasharray: 6,3; }
.rebate { fill: #faebe0; stroke: #e67e22; stroke-width: 1.0; stroke-dasharray: 4,2; }
.pilot { fill: #333; }
.dim-line { stroke: #2980b9; stroke-width: 0.8; fill: none; }
.dim-text { fill: #2980b9; font-family: sans-serif; font-size: 11px; text-anchor: middle; }
.dim-text-v { fill: #2980b9; font-family: sans-serif; font-size: 11px; text-anchor: middle; }
.label { fill: #333; font-family: sans-serif; font-size: 12px; text-anchor: middle; font-weight: bold; }
.label-sm { fill: #555; font-family: sans-serif; font-size: 10px; text-anchor: middle; }
.label-driver { fill: #c0392b; font-family: sans-serif; font-size: 11px; text-anchor: middle; font-weight: bold; }
.title-text { fill: #222; font-family: sans-serif; font-size: 16px; font-weight: bold; }
.subtitle { fill: #555; font-family: sans-serif; font-size: 10px; }
.note { fill: #555; font-family: sans-serif; font-size: 10px; }
.arrow { stroke: #2980b9; stroke-width: 0.8; fill: #2980b9; }
.center-line { stroke: #888; stroke-width: 0.5; stroke-dasharray: 8,3,2,3; }
</style>
<rect width="298" height="358" fill="white"/>
<text x="15.0" y="20.0" class="title-text">Divider Plate — Cut Drawing</text>
<text x="15.0" y="38.0" class="subtitle">276 × 336 mm, 22 mm ply, tilted 19° in cabinet</text>
<rect x="80.0" y="110.0" width="138.0" height="168.0" class="panel"/>
<text x="149.0" y="194.0" class="label-sm">Cut to internal cavity shape
(front edge follows rounded side walls)</text>
<text x="149.0" y="303.0" class="note">Front edge sits at z=985 mm, rises 19° toward rear</text>
<line x1="80.0" y1="278.0" x2="80.0" y2="263.0" class="dim-line"/>
<line x1="218.0" y1="278.0" x2="218.0" y2="263.0" class="dim-line"/>
<line x1="80.0" y1="263.0" x2="218.0" y2="263.0" class="dim-line"/>
<polygon points="80.0,263.0 84.0,261.0 84.0,265.0" class="arrow"/>
<polygon points="218.0,263.0 214.0,261.0 214.0,265.0" class="arrow"/>
<text x="149.0" y="259.0" class="dim-text">int W=276</text>
<line x1="90.0" y1="110.0" x2="105.0" y2="110.0" class="dim-line"/>
<line x1="90.0" y1="278.0" x2="105.0" y2="278.0" class="dim-line"/>
<line x1="105.0" y1="110.0" x2="105.0" y2="278.0" class="dim-line"/>
<polygon points="105.0,110.0 103.0,114.0 107.0,114.0" class="arrow"/>
<polygon points="105.0,278.0 103.0,274.0 107.0,274.0" class="arrow"/>
<text x="119.0" y="194.0" class="dim-text-v" transform="rotate(-90 119.0 194.0)">int D=336</text>
<line x1="90.0" y1="209.0" x2="208.0" y2="179.0" class="center-line"/>
<text x="149.0" y="174.0" class="label-sm">tilt 19°</text>
</svg>
